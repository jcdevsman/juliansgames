<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julian's Games V5</title>
    <link rel="shortcut icon" href="google-classroom.png" type="image/x-icon">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        body, html {
            height: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            background: url('https://img.freepik.com/free-photo/beautiful-shot-mountains-trees-covered-snow-fog_181624-17590.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            display: flex;
            flex-direction: column;
            transition: backdrop-filter 0.6s ease, filter 0.6s ease;
        }

        .game-active-blur {
            backdrop-filter: blur(20px) brightness(0.4);
            -webkit-backdrop-filter: blur(20px) brightness(0.4);
        }

        /* ── NAVBAR ── */
        .navbar {
            height: 64px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        .brand {
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            background: linear-gradient(90deg, #fff 0%, #00c6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            user-select: none;
        }

        /* ── SEARCH BAR ── */
        .search-container {
            flex: 0 1 500px;
            margin: 0 30px;
            position: relative;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px 10px 45px;
            border-radius: 25px;
            color: #ffffff !important; 
            font-size: 16px;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.85);
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #00c6ff;
            box-shadow: 0 0 15px rgba(0, 198, 255, 0.4);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            pointer-events: none;
        }

        /* ── LAYOUT ── */
        .content-layout {
            flex: 1;
            display: flex;
            overflow: hidden;
            padding: 20px;
            gap: 24px;
            max-width: 1700px;
            margin: 0 auto;
            width: 100%;
        }

        .video-container {
            flex: 3;
            display: none;
            flex-direction: column;
            animation: fadeUp 0.4s ease-out forwards;
        }

        .player-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }

        iframe { width: 100%; height: 100%; border: none; background: #000; }

        .video-meta-frame {
            margin-top: 16px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .video-info h1 { font-size: 1.4rem; letter-spacing: -0.5px; }
        .dev-text { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 4px; }

        .actions {
            display: flex;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .action-btn {
            background: transparent;
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .action-btn:hover { background: rgba(255,255,255,0.1); }
        .action-btn.active { color: #3ea6ff; background: rgba(62, 166, 255, 0.1); }
        .divider { width: 1px; background: rgba(255,255,255,0.15); margin: 6px 4px; }

        .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .sidebar-mode { max-width: 400px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
        .sidebar-mode .grid { grid-template-columns: 1fr; }

        .card { cursor: pointer; border-radius: 12px; overflow: hidden; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
        .card:hover { border-color: #00c6ff; transform: translateY(-2px); }
        .card.hidden { display: none; }

        .thumb { width: 100%; aspect-ratio: 16 / 9; background: #111; overflow: hidden; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 12px; }

        #loader {
            position: absolute; inset: 0; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            background: #000; z-index: 10;
        }
        .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #00a2ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    </style>
</head>
<body id="main-body">

<header class="navbar">
    <div class="brand" onclick="goHome()">Julian's Games</div>
    
    <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-bar" class="search-input" placeholder="Search for games..." onkeyup="filterGames()">
    </div>
    
    <div style="width: 180px;"></div>
</header>

<div class="content-layout">
    <div class="video-container" id="video-page">
        <div class="player-box" id="fullscreen-target">
            <div id="loader"><div class="spinner"></div></div>
            <iframe id="frame"></iframe>
        </div>
        
        <div class="video-meta-frame">
            <div class="video-info">
                <h1 id="playing-title">Game Title</h1>
                <p class="dev-text">author</p>
            </div>
            
            <div class="actions">
                <button class="action-btn" onclick="toggleVote(this, 'like')">
                    👍 <span id="like-count">0</span>
                </button>
                <div class="divider"></div>
                <button class="action-btn" onclick="toggleVote(this, 'dislike')">
                    👎
                </button>
                <div class="divider"></div>
                <button class="action-btn" onclick="toggleFullScreen()" title="Full Screen">
                    ⛶ Full Screen
                </button>
            </div>
        </div>
    </div>

    <main class="scroll-area" id="main-scroll">
        <div class="grid" id="grid">
            <div class="card" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/onevonedotlol.html', '1v1.lol')">
                <div class="thumb"><img src="https://pbs.twimg.com/profile_images/1219353297129295874/HDIEpfJr_400x400.jpg"></div>
                <div class="card-body"><div class="game-title" style="font-size: 14px; font-weight: 600;">1v1.lol</div></div>
            </div>
            <div class="card" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/ClusterRush.html', 'ClusterRush')">
                <div class="thumb"><img src="https://i.imgur.com/2ahVmwO.png"></div>
                <div class="card-body"><div class="game-title" style="font-size: 14px; font-weight: 600;">ClusterRush</div></div>
            </div>
            <div class="card" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/FNAE', 'Five nights at epstein  (Possibly broken rn)')">
                <div class="thumb"><img src="https://i.imgur.com/coge0s9.png"></div>
                <div class="card-body"><div class="game-title" style="font-size: 14px; font-weight: 600;">Five nights at epstein</div></div>
            </div>
            <div class="card" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/Karlson.html', 'Karlson (Webport)')">
                <div class="thumb"><img src="https://i.imgur.com/Lx948s4.png"></div>
                <div class="card-body"><div class="game-title" style="font-size: 14px; font-weight: 600;">Karlson</div></div>
            </div>
            <div class="card" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/agesofconflict.html', 'Ages of conflict (Demo vers. only sry)')">
                <div class="thumb"><img src="https://i.imgur.com/WMVOiGH.png"></div>
                <div class="card-body"><div class="game-title" style="font-size: 14px; font-weight: 600;">Ages of conflict</div></div>
            </div>
            <div class="card" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/stickmanhook.html', 'Stick man hook (A Julian games v4 orginial)')">
                <div class="thumb"><img src="https://i.imgur.com/RWnMjNZ.png"></div>
                <div class="card-body"><div class="game-title" style="font-size: 14px; font-weight: 600;">Stickman hook</div></div>
            </div>
            <div class="card" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/stop_crying_im_only_stabbing_u.html', 'BLOODMONEY!! Click him and earn money')">
                <div class="thumb"><img src="https://i.imgur.com/L4PO2z5.png"></div>
                <div class="card-body"><div class="game-title" style="font-size: 14px; font-weight: 600;">BLOODMONEY!</div></div>
            </div>
        </div>
    </main>
</div>

<script>
    const videoPage = document.getElementById('video-page');
    const mainScroll = document.getElementById('main-scroll');
    const frame = document.getElementById('frame');
    const loader = document.getElementById('loader');
    const body = document.getElementById('main-body');
    const likeCounter = document.getElementById('like-count');

    function filterGames() {
        const input = document.getElementById('search-bar').value.toLowerCase();
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            const title = card.querySelector('.game-title').innerText.toLowerCase();
            card.classList.toggle('hidden', !title.includes(input));
        });
    }

    async function launch(url, title) {
        videoPage.style.display = 'flex';
        mainScroll.classList.add('sidebar-mode');
        body.classList.add('game-active-blur'); 
        document.getElementById('playing-title').innerText = title;
        loader.style.display = 'flex';
        frame.srcdoc = '';
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error();
            const code = await res.text();
            frame.srcdoc = code; 
            loader.style.display = 'none';
        } catch (err) {
            frame.src = url;
            frame.onload = () => { loader.style.display = 'none'; };
        }
    }

    function goHome() {
        videoPage.style.display = 'none';
        mainScroll.classList.remove('sidebar-mode');
        body.classList.remove('game-active-blur'); 
        frame.srcdoc = '';
        frame.src = '';
        document.getElementById('search-bar').value = '';
        filterGames();
    }

    function toggleVote(btn, type) {
        const isActive = btn.classList.contains('active');
        let likes = parseInt(likeCounter.innerText);
        btn.parentElement.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
        if (!isActive) {
            btn.classList.add('active');
            if (type === 'like') likeCounter.innerText = likes + 1;
            else if (likes > 0) likeCounter.innerText = likes - 1;
        } else if (type === 'like') {
            likeCounter.innerText = likes - 1;
        }
    }

    function toggleFullScreen() {
        const target = document.getElementById('fullscreen-target');
        if (!document.fullscreenElement) {
            target.requestFullscreen().catch(err => alert(err.message));
        } else {
            document.exitFullscreen();
        }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') goHome(); });
</script>

</body>
</html>

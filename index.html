<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lake County Schools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 flex items-center justify-center min-h-screen">

    <div class="text-center max-w-md px-6">
        <h1 class="text-4xl font-light text-zinc-100 mb-4 tracking-tight">
            Julian's Games loader
        </h1>
        <p class="text-zinc-500 mb-10 leading-relaxed font-light">
            
        </p>
        
        <button id="launchBtn" class="px-10 py-3.5 bg-gradient-to-r from-cyan-400 to-blue-500 text-white font-semibold rounded-xl hover:shadow-[0_0_20px_rgba(34,211,238,0.4)] hover:scale-105 transition-all duration-300 active:scale-95">
            Launch
        </button>
    </div>

    <script>
        // Replace with your actual GitHub Raw URL
        const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/website.html';

        document.getElementById('launchBtn').addEventListener('click', async () => {
            const btn = document.getElementById('launchBtn');
            const originalText = btn.innerText;

            try {
                btn.innerText = 'Connecting...';
                btn.style.opacity = '0.7';
                
                // Fetch the code from GitHub
                const response = await fetch(GITHUB_RAW_URL);
                if (!response.ok) throw new Error('Source not found');
                const code = await response.text();

                // Open a new blank window
                const newWin = window.open('about:blank', '_blank');

                if (newWin) {
                    // Inject and execute the code
                    newWin.document.open();
                    newWin.document.write(code);
                    newWin.document.close();
                } else {
                    alert('Pop-up blocked. Please enable pop-ups for this site.');
                }

            } catch (error) {
                console.error('Launch Error:', error);
                alert('Launch failed. Contact julian, or email him. And send him just "403"');
            } finally {
                btn.innerText = originalText;
                btn.style.opacity = '1';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jOS 26</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: url("https://images.unsplash.com/photo-1663970206579-c157cba7edda?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8YWJzdHJhY3QlMjB3YWxscGFwZXJ8ZW58MHx8MHx8fDA%3D") no-repeat center/cover;
    height: 100vh;
    overflow: hidden;
    color: white;
}

/* Mica */
.mica {
    backdrop-filter: blur(30px) saturate(140%);
    background: rgba(30,30,30,0.55);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
}

/* TASKBAR */
.taskbar {
    position: absolute;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: center;
}

.dock {
    display: flex;
    gap: 12px;
    padding: 10px 18px;
}

.icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
}

.icon img {
    width: 53px;
}

.icon:hover {
    transform: scale(1.05);
}

/* START MENU */
.start-menu {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    width: 720px;
    height: 480px;
    overflow: hidden;
}

/* LEFT */
.start-left {
    width: 230px;
    padding: 20px;
    background: rgba(0,0,0,0.35);
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.user {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
}

.avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg,#7f5af0,#2cb67d);
}

.start-search {
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

.app-list div {
    padding: 6px;
    border-radius: 8px;
    cursor: pointer;
}
.app-list div:hover {
    background: rgba(255,255,255,0.1);
}

/* RIGHT */
.start-right {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.block {
    background: rgba(255,255,255,0.08);
    padding: 15px;
    border-radius: 14px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 10px;
}

.tile {
    padding: 12px;
    text-align: center;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    cursor: pointer;
}
.tile:hover {
    background: rgba(255,255,255,0.2);
}

/* WINDOW */
.window {
    position: absolute;
    width: 900px;
    height: 550px;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    display: none;
    flex-direction: column;
    overflow: hidden;
}

/* TITLEBAR */
.titlebar {
    display: flex;
    align-items: center;
    padding: 10px;
    gap: 10px;
    cursor: grab;
}

.window-icon {
    width: 20px;
}

.search-bar {
    flex: 1;
}

.search-bar input {
    width: 100%;
    padding: 6px 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.15);
    color: white;
}

.controls {
    display: flex;
    gap: 8px;
}

.control {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    cursor: pointer;
}

.min { background:#f5c542; }
.max { background:#4caf50; }
.close { background:#f44336; }

.settings-body {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow: auto;
}

/* Header */
.settings-header {
    display: flex;
    align-items: center;
    gap: 15px;
}

.avatar.large {
    width: 60px;
    height: 60px;
}

.settings-name {
    font-size: 20px;
    font-weight: 600;
}

.settings-sub {
    opacity: 0.7;
    font-size: 14px;
}

/* Search */
.settings-search {
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

/* Grid */
.settings-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.settings-tile {
    padding: 16px;
    border-radius: 14px;
    background: rgba(255,255,255,0.08);
    cursor: pointer;
    transition: 0.2s;
}

.settings-tile:hover {
    background: rgba(255,255,255,0.18);
}

/* IFRAME */
iframe {
    flex: 1;
    border: none;
    background: white;
}

.resizer {
    width: 14px;
    height: 14px;
    position: absolute;
    right: 0;
    bottom: 0;
    cursor: nwse-resize;
    z-index: 10; /* Ensures it stays on top of content */
}
</style>
</head>

<body>

<!-- START MENU -->
<div class="start-menu mica" id="startMenu">
    <div class="start-left">
        <div class="user">
            <div class="avatar"></div>
            <div>User</div>
        </div>

        <input class="start-search" placeholder="Type here to search">

        <div class="app-list">
            <div onclick="openSurfer()">🌐 Surfer</div>
            <div onclick="openSettings()">⚙ Settings</div>
            <div>📁 Explorer</div>
        </div>
    </div>

    <div class="start-right">
        <div class="block">
            <h3>Pinned</h3>
            <div class="grid">
                <div class="tile" onclick="openSurfer()">🏄‍♂️ Surfer</div>
                <div class="tile" onclick="openStore()">🛒 Store</div>
                <div class="tile">📂 Files</div>
                <div class="tile" onclick="openSettings()">⚙️Options</div>
            </div>
        </div>

        <div class="block">
            <h3>Recommended</h3>
            <div>Nothing yet</div>
        </div>
    </div>
</div>

<!-- SURFER -->
<div class="window mica" id="surferWindow">
    <div class="titlebar" id="dragArea">
        <img id="surferIcon" class="window-icon">

        <div class="search-bar">
            <input id="urlInput" placeholder="Enter URL or search...">
        </div>

        <div class="controls">
            <div class="control min" onclick="minimize()"></div>
            <div class="control max" onclick="maximize()"></div>
            <div class="control close" onclick="closeWindow()"></div>
        </div>
    </div>

    <iframe id="browser"></iframe>
    <div class="resizer"></div>
</div>


<!-- Settings -->
<div class="window mica" id="settingsWindow">

    <!-- Titlebar -->
    <div class="titlebar settings-drag">
        <img src="https://i.imgur.com/BFxAD9T.png" class="window-icon">

        <div style="font-weight:600;">Settings</div>

        <div class="controls">
            <div class="control min" onclick="minimizeSettings()"></div>
            <div class="control max" onclick="maximizeSettings()"></div>
            <div class="control close" onclick="closeSettings()"></div>
        </div>
    </div>

    <!-- Content -->
    <div class="settings-body">

        <!-- Top Profile -->
        <div class="settings-header">
            <div class="avatar large"></div>

            <div>
                <div class="settings-name">Administrator</div>
                <div class="settings-sub">Local Account</div>
            </div>
        </div>

        <!-- Search -->
        <input class="settings-search" placeholder="Find a setting">

        <!-- Grid -->
        <div class="settings-grid">

            <div class="settings-tile">💻 System</div>
            <div class="settings-tile">📱 Devices</div>
            <div class="settings-tile">📞 Phone</div>

            <div class="settings-tile">🌐 Network</div>
            <div class="settings-tile">🎨 Personalization</div>
            <div class="settings-tile">📦 Apps</div>

            <div class="settings-tile">👤 Accounts</div>
            <div class="settings-tile">🕒 Time & Language</div>
            <div class="settings-tile">🎮 Gaming</div>

            <div class="settings-tile">♿ Accessibility</div>
            <div class="settings-tile">🔍 Search</div>
            <div class="settings-tile">🔒 Privacy</div>

        </div>

    </div>

    <div class="resizer"></div>
</div>

<div class="window mica" id="storeWindow">
    <div class="titlebar" id="storeDrag">
        <img src="https://i.imgur.com/thrSawY.png" class="window-icon"> <div style="font-weight:600;">Store</div>
        <div class="controls">
            <div class="control min" onclick="minimizeStore()"></div>
            <div class="control max" onclick="maximizeStore()"></div>
            <div class="control close" onclick="closeStore()"></div>
        </div>
    </div>
    <iframe id="storeFrame"></iframe>
    <div class="resizer"></div>
</div>

<!-- TASKBAR -->
<div class="taskbar">
    <div class="dock mica">
        <div class="icon" onclick="toggleStart()">
            <img src="https://i.imgur.com/uBlK5E2.png">
        </div>
        <div class="icon" onclick="openSurfer()">
            <img id="dockSurferIcon">
        </div>
        <div class="icon" onclick="openSettings()">
            <img id="settingIcon">
        </div>
        <div class="icon" onclick="openStore()">
            <img src="https://i.imgur.com/thrSawY.png">
        </div>
    </div>
</div>

<script>
// ICONS
const surferIcon = "https://i.imgur.com/YzaF5v8.png";
const settingsIcon = "https://i.imgur.com/jO7ZBMY.png";
document.getElementById("dockSurferIcon").src = surferIcon;
document.getElementById("surferIcon").src = surferIcon;
document.getElementById("settingIcon").src = settingsIcon;

// START MENU
function toggleStart(){
    const m = document.getElementById("startMenu");
    m.style.display = (m.style.display==="flex")?"none":"flex";
}

// WINDOW
const win = document.getElementById("surferWindow");
const dragArea = document.getElementById("dragArea");

function openSurfer() {
    const win = document.getElementById("surferWindow");
    const browser = document.getElementById("browser");

    win.style.display = "flex";

    // Only set default page if nothing is loaded yet
    if (!browser.src || browser.src === "about:blank") {
        browser.src = "https://www.google.com/search?igu=1";
    }
}
function closeWindow(){ win.style.display="none"; }
function minimize(){ win.style.display="none"; }

function maximize(){
    if(win.dataset.max){
        win.style = "";
        win.className="window mica";
        win.dataset.max="";
    } else {
        win.style.top="0";
        win.style.left="0";
        win.style.width="100%";
        win.style.height="100%";
        win.style.transform="none";
        win.dataset.max="1";
    }
}

// DRAG
let drag=false,dx,dy;

dragArea.addEventListener("mousedown",e=>{
    if(e.target.tagName==="INPUT" || e.target.closest(".controls")) return;
    drag=true;
    dx=e.clientX-win.offsetLeft;
    dy=e.clientY-win.offsetTop;
});

document.addEventListener("mousemove",e=>{
    if(!drag) return;
    win.style.left=(e.clientX-dx)+"px";
    win.style.top=(e.clientY-dy)+"px";
    win.style.transform="none";
});

document.addEventListener("mouseup",()=>drag=false);



document.addEventListener("mouseup",()=>resize=false);

const iframe = document.getElementById("browser");

iframe.addEventListener("load", () => {
    try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;

        const links = doc.querySelectorAll("a");
        links.forEach(link => {
            link.removeAttribute("target");
            link.addEventListener("click", (e) => {
                e.preventDefault();
                iframe.src = link.href;
            });
        });

    } catch (e) {
        console.warn("Cross-origin site — cannot control links.");
    }
});

// Generic Resizer Function
function makeResizable(win) {
    const resizer = win.querySelector(".resizer");
    if (!resizer) return; // Exit if no resizer exists

    let resize = false;

    resizer.addEventListener("mousedown", (e) => {
        resize = true;
        e.preventDefault(); // Prevents text selection while resizing
    });

    document.addEventListener("mousemove", (e) => {
        if (!resize) return;
        
        // Calculate new dimensions based on mouse position
        const newWidth = e.clientX - win.offsetLeft;
        const newHeight = e.clientY - win.offsetTop;
        
        // Set minimum size constraints (optional but recommended)
        if (newWidth > 200) win.style.width = newWidth + "px";
        if (newHeight > 150) win.style.height = newHeight + "px";
    });

    document.addEventListener("mouseup", () => {
        resize = false;
    });
}

// Initialize for each window after they are defined
document.addEventListener("DOMContentLoaded", () => {
    makeResizable(document.getElementById("surferWindow"));
    makeResizable(document.getElementById("settingsWindow"));
    makeResizable(document.getElementById("storeWindow"));
});

const settingsWin = document.getElementById("settingsWindow");

// open
function openSettings() {
    settingsWin.style.display = "flex";
}

// close
function closeSettings() {
    settingsWin.style.display = "none";
}

// minimize
function minimizeSettings() {
    settingsWin.style.display = "none";
}

// maximize
function maximizeSettings() {
    if (settingsWin.dataset.max) {
        settingsWin.style = "";
        settingsWin.className = "window mica";
        settingsWin.dataset.max = "";
    } else {
        settingsWin.style.top = "0";
        settingsWin.style.left = "0";
        settingsWin.style.width = "100%";
        settingsWin.style.height = "100%";
        settingsWin.style.transform = "none";
        settingsWin.dataset.max = "1";
    }
}

makeDraggable(settingsWin, settingsWin.querySelector(".settings-drag"));

function makeDraggable(win, dragArea){
    let drag=false,dx,dy;

    dragArea.addEventListener("mousedown",e=>{
        if(e.target.closest(".controls")) return;
        drag=true;
        dx=e.clientX-win.offsetLeft;
        dy=e.clientY-win.offsetTop;
    });

    document.addEventListener("mousemove",e=>{
        if(!drag) return;
        win.style.left=(e.clientX-dx)+"px";
        win.style.top=(e.clientY-dy)+"px";
        win.style.transform="none";
    });

    document.addEventListener("mouseup",()=>drag=false);
}

// 1. Declare the variables globally at the top of your script
let storeWin;
let storeFrame;
const STORE_URL = "https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/store.html";

// 2. Initialize everything inside DOMContentLoaded
document.addEventListener("DOMContentLoaded", () => {
    // Assign the elements
    storeWin = document.getElementById("storeWindow");
    storeFrame = document.getElementById("storeFrame");

    // Ensure they exist
    if (!storeWin || !storeFrame) {
        console.warn("Store elements not found in DOM");
        return;
    }

    // Attach drag functionality
    makeDraggable(storeWin, document.getElementById("storeDrag"));
});

// 3. Define the functions globally
function openStore() {
    storeWin.style.display = "flex";
    
    // Fetch and inject if not already loaded
    if (!storeFrame.srcdoc) {
        storeFrame.srcdoc = "<p style='color:white; padding:20px;'>Loading...</p>";
        
        fetch(STORE_URL)
            .then(res => res.ok ? res.text() : Promise.reject())
            .then(html => {
                storeFrame.srcdoc = html;
            })
            .catch(() => {
                storeFrame.srcdoc = "<h1 style='color:white; padding:20px;'>Failed to load store</h1>";
            });
    }
}

function closeStore() { storeWin.style.display = "none"; }
function minimizeStore() { storeWin.style.display = "none"; }

function maximizeStore() {
    if (storeWin.dataset.max) {
        storeWin.style.cssText = ""; // Reset
        storeWin.dataset.max = "";
    } else {
        storeWin.style.top = "0";
        storeWin.style.left = "0";
        storeWin.style.width = "100%";
        storeWin.style.height = "100%";
        storeWin.style.transform = "none";
        storeWin.dataset.max = "1";
    }
}

// URL LOAD
document.getElementById("urlInput").addEventListener("keydown",function(e){
    if(e.key==="Enter"){
        let url=this.value.trim();

        if(!url.includes(".")){
            url="https://www.bing.com/search?q="+encodeURIComponent(url);
        } else if(!url.startsWith("http")){
            url="https://"+url;
        }

        document.getElementById("browser").src=url;
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google classroom</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0c0b0f;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #c9bfff;
            --accent2: #9fc8e8;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%; overflow: hidden;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-main);
            /* EXACT SOLARA MESH BACKGROUND */
            background: 
                radial-gradient(ellipse 90% 65% at 50% -5%, rgba(80,55,145,0.7) 0%, transparent 55%),
                radial-gradient(ellipse 55% 45% at 10% 50%, rgba(30,70,120,0.35) 0%, transparent 55%),
                radial-gradient(ellipse 50% 55% at 90% 30%, rgba(100,50,90,0.3) 0%, transparent 50%),
                #08060f;
            display: flex; flex-direction: column;
        }

        /* Glassmorphism Effect */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px) saturate(1.5);
            -webkit-backdrop-filter: blur(12px) saturate(1.5);
            border: 1px solid var(--glass-border);
        }

        /* ── NAVBAR ── */
        .navbar {
            height: 64px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }

        .brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px; font-weight: 300; letter-spacing: 0.05em;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .search-input {
            width: 350px; padding: 10px 20px; border-radius: 100px;
            background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border);
            color: white; outline: none; transition: 0.3s;
        }

        /* ── LAYOUT ── */
        .content-layout { flex: 1; display: flex; overflow: hidden; padding: 20px; gap: 20px; }

        /* Game Viewer (Fixed proportions) */
        .video-container { flex: 3; display: none; flex-direction: column; min-width: 0; }
        .player-box { width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 16px; overflow: hidden; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        .video-meta-frame {
            margin-top: 16px; padding: 20px; border-radius: 16px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .video-info h1 { font-family: 'Cormorant Garamond', serif; font-size: 26px; color: #fff; }

        /* Game Grid */
        .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .sidebar-mode { max-width: 400px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
        .sidebar-mode .grid { grid-template-columns: 1fr; }

        .card { cursor: pointer; border-radius: 12px; overflow: hidden; transition: 0.3s cubic-bezier(0.1, 0.7, 0.1, 1); }
        .card:hover { transform: translateY(-4px); border-color: var(--accent); }
        .thumb img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-body { padding: 12px; text-align: center; font-weight: 500; }

        .action-btn {
            background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);
            color: white; padding: 8px 18px; border-radius: 100px; cursor: pointer; transition: 0.2s;
        }
        .action-btn:hover { background: var(--accent); color: #000; }
        .action-btn.active { background: var(--accent); color: #000; }

        #loader { position: absolute; inset: 0; display: none; background: #000; justify-content: center; align-items: center; z-index: 5; }
    </style>
</head>
<body>

<header class="navbar glass">
    <div class="brand" onclick="goHome()">Julian's Games V5</div>
    <input type="text" id="search-bar" class="search-input" placeholder="Search experiences..." onkeyup="filterGames()">
    <div style="width: 100px;"></div>
</header>

<div class="content-layout">
    <div class="video-container" id="video-page">
        <div class="player-box glass">
            <div id="loader"><p>Loading Experience...</p></div>
            <iframe id="frame"></iframe>
        </div>
        
        <div class="video-meta-frame glass">
            <div class="video-info">
                <h1 id="playing-title">Experience</h1>
                <p style="font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-top:4px;">Every games can take up to 30secs to load</p>
            </div>
            <div style="display:flex; gap:12px;">
                <button class="action-btn" id="like-btn" onclick="toggleVote(this)">👍 <span id="like-count">0</span></button>
                <button class="action-btn" onclick="toggleFullScreen()">⛶ Fullscreen</button>
            </div>
        </div>
    </div>

    <main class="scroll-area" id="main-scroll">
        <div class="grid" id="grid">
            <div class="card glass" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/onevonedotlol.html', '1v1.lol (OG Game)')">
                <div class="thumb"><img src="https://i.imgur.com/sF99zu0.png"></div>
                <div class="card-body"><div class="game-title">1v1.lol</div></div>
            </div>
            <div class="card glass" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/stop_crying_im_only_stabbing_u.html', 'Bloodmoney (Zoom it pressing Cntrl + or zoom out Cntrl -)')">
                <div class="thumb"><img src="https://i.imgur.com/L4PO2z5.png"></div>
                <div class="card-body"><div class="game-title">BLOODMONEY!</div></div>
            </div>
            <div class="card glass" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/ClusterRush.html', 'ClusterRush (OG Game)')">
                <div class="thumb"><img src="https://i.imgur.com/2ahVmwO.png"></div>
                <div class="card-body"><div class="game-title">ClusterRush</div></div>
            </div>
            <div class="card glass" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/Choppy%20Orc.html', 'Choppy orc')">
                <div class="thumb"><img src="https://i.imgur.com/8MAUMqa.png"></div>
                <div class="card-body"><div class="game-title">Choppy Orc</div></div>
            </div>
            <div class="card glass" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/Drivemading.html', 'DriveMad (OG Game)')">
                <div class="thumb"><img src="https://i.imgur.com/we1Tmzp.png"></div>
                <div class="card-body"><div class="game-title">DriveMad</div></div>
            </div>
            <div class="card glass" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/Escape%20Road.html', 'Escape Road')">
                <div class="thumb"><img src="https://i.imgur.com/p0d4Lm6.png"></div>
                <div class="card-body"><div class="game-title">Escape Road</div></div>
            </div>
            <div class="card glass" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/escaperoad2.html', 'Escape Road 2')">
                <div class="thumb"><img src="https://i.imgur.com/p0d4Lm6.png"></div>
                <div class="card-body"><div class="game-title">Escape Road 2</div></div>
            </div>
            <div class="card glass" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/Geodash.html', 'Geometry Dash ')">
                <div class="thumb"><img src="https://i.imgur.com/n8Go48j.png"></div>
                <div class="card-body"><div class="game-title">Geometry dash</div></div>
            </div>
            <div class="card glass" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/geodashscratch.html', 'Geometry Dash (Remake)')">
                <div class="thumb"><img src="https://i.ytimg.com/vi/Lh3_WqyKd8M/maxresdefault.jpg"></div>
                <div class="card-body"><div class="game-title">Geometry dash (Scratch)</div></div>
            </div>
            <div class="card glass" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/Karlson.html', 'Karlson')">
                <div class="thumb"><img src="https://i.imgur.com/Lx948s4.png"></div>
                <div class="card-body"><div class="game-title">Karlson</div></div>
            </div>
            <div class="card glass" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/stickman.html', 'Stick manhook (OG Game)')">
                <div class="thumb"><img src="https://i.imgur.com/wC1RHfo.png"></div>
                <div class="card-body"><div class="game-title">Stickman hook</div></div>
            </div>
            <div class="card glass" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/Soundboard.html', 'Soundboard')">
                <div class="thumb"><img src="https://cdn.jsdelivr.net/gh/freebuisness/covers@main/179.png"></div>
                <div class="card-body"><div class="game-title">Soundboard</div></div>
            </div>
            <div class="card glass" onclick="launch('https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/TheyAreComing.html', 'They are coming')">
                <div class="thumb"><img src="https://i.imgur.com/fcjK5EZ.png"></div>
                <div class="card-body"><div class="game-title">They are coming</div></div>
            </div>  
    </main>
</div>

<script>
    const videoPage = document.getElementById('video-page');
    const mainScroll = document.getElementById('main-scroll');
    const frame = document.getElementById('frame');
    const loader = document.getElementById('loader');

    // ── LIVE CLOUD COUNTER API ──
    // Uses a revival of countapi.xyz
    async function loadLikes(title) {
        const key = "julian-" + title.replace(/\s+/g, '-').toLowerCase();
        const countSpan = document.getElementById('like-count');
        try {
            const res = await fetch(`https://countapi.mileshilliard.com/api/v1/get/${key}`);
            const data = await res.json();
            countSpan.innerText = data.value || 0;
        } catch (e) { countSpan.innerText = "0"; }
    }

    async function toggleVote(btn) {
        if (btn.classList.contains('active')) return;
        const title = document.getElementById('playing-title').innerText;
        const key = "julian-" + title.replace(/\s+/g, '-').toLowerCase();
        const countSpan = document.getElementById('like-count');
        
        btn.classList.add('active');
        try {
            const res = await fetch(`https://countapi.mileshilliard.com/api/v1/hit/${key}`);
            const data = await res.json();
            countSpan.innerText = data.value;
        } catch (e) { console.log("API Error"); }
    }

    // ── CORE LOGIC ──
    async function launch(url, title) {
        videoPage.style.display = 'flex';
        mainScroll.classList.add('sidebar-mode');
        document.getElementById('playing-title').innerText = title;
        document.getElementById('like-btn').classList.remove('active');
        
        loadLikes(title); // Fetch likes from cloud
        
        loader.style.display = 'flex';
        frame.srcdoc = '';
        try {
            const res = await fetch(url);
            frame.srcdoc = await res.text();
            loader.style.display = 'none';
        } catch (err) {
            frame.src = url;
            frame.onload = () => { loader.style.display = 'none'; };
        }
    }

    function goHome() {
        videoPage.style.display = 'none';
        mainScroll.classList.remove('sidebar-mode');
        frame.src = ''; frame.srcdoc = '';
    }

    function filterGames() {
        const input = document.getElementById('search-bar').value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            const title = card.innerText.toLowerCase();
            card.style.display = title.includes(input) ? "block" : "none";
        });
    }

    function toggleFullScreen() {
        const box = document.querySelector('.player-box');
        if (!document.fullscreenElement) box.requestFullscreen();
        else document.exitFullscreen();
    }


    let hasInteracted = false;

    // 1. Mark that the user has interacted with the page
    // Browsers require a "user gesture" before they allow the prompt
    window.addEventListener('click', () => hasInteracted = true);
    window.addEventListener('keydown', () => hasInteracted = true);

    window.addEventListener('beforeunload', (event) => {
        if (hasInteracted) {
            // 2. Standard way to trigger prompt in modern browsers
            event.preventDefault(); 
            
            // 3. Required for legacy Chrome and Safari support
            event.returnValue = "Changes you made may not be saved."; 
            
            // 4. Required for some older Firefox versions
            return "Changes you made may not be saved.";
        }
    });


    $('.summernote').summernote({
    toolbar: [
        ['save', ['save']], // The button
    ],
    save:{
      lang: 'en-US', // Change to your chosen language
      encode: false, // true = encode editor data, you may need to unencode the data on your backend or before output.
      pageBlockClass: '.page-block', // Leave empty if not using an overlay to block user activity while data is sent.
      pageBlockToggle: 'd-block', // Class to use to toggle Page Block. Remove the class via backend once data is safely stored.
      saveBtnIndicator: 'btn-danger', // Class to change save button indication when content changes to warn of unsaved data.
    }

    




});



</script>
</body>
</html>

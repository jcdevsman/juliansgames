<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, sans-serif;
}

body {
    background: #0a0a0a;
    color: white
}

/* BACKGROUND */
canvas {
    position: fixed;
    inset: 0;
    z-index: -1;
}

.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 40px;
    gap: 10px;
}

.hero-left {
    flex: 1;
}

.hero-left h1 {
    font-size: 4rem;
    margin-bottom: 20px;
}

.hero-right {
    flex: 1;
    display: flex;
    justify-content: center;
}

.hero-right img {
    width: 100%;
    max-width: 500px;
    border-radius: 20px;
    opacity: 1;
}

.viewer {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
    display: flex;
    justify-content: center;
    align-items: center;

    opacity: 0;
    pointer-events: none;
    transition: 0.25s ease;
}

.viewer.active {
    opacity: 1;
    pointer-events: all;
}

/* animation container */
.viewer-content {
    transform: scale(0.95);
    opacity: 0;
    transition: 0.25s ease;
}

.viewer.active .viewer-content {
    transform: scale(1);
    opacity: 1;
}

.hero h1 {
    font-size: 4rem;
    margin-bottom: 20px;
}

.search {
    max-width: 500px;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #1a1a1a;
    color: white;
}

/* CONTENT */
.container {
    max-width: 1200px;
    margin: auto;
    padding: 40px 20px;
}

.games {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 15px;
}

/* GAME CARD (SQUARE) */
.game {
    background: #141414;
    border-radius: 16px;
    cursor: pointer;
    transition: 0.2s;
    aspect-ratio: 1 / 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.game img {
    width: 110px;
    height: 110px;
    border-radius: 10px;
}

.game:hover {
    transform: translateY(-5px);
    background: #1f1f1f;
}

.viewer {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);

    display: flex;
    justify-content: center;
    align-items: center;

    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 1000;
}

.viewer.active {
    opacity: 1;
    pointer-events: all;
}
/* MAIN LAYOUT (LIKE YOUTUBE) */
.viewer-content {
    width: 90%;
    height: 90%;
    display: flex;
    gap: 20px;
}

/* LEFT (PLAYER + INFO) */
.player-section {
    flex: 3;
    display: flex;
    flex-direction: column;
}

/* PLAYER */
.player {
    background: black;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    aspect-ratio: 16 / 9;
}

/* FULLSCREEN BUTTON */
.fullscreen-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
}

/* GAME FRAME */
iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* INFO */
.info {
    margin-top: 10px;
}

.info h2 {
    margin-bottom: 5px;
}

.info p {
    opacity: 0.8;
    font-size: 0.9rem;
}

/* RIGHT (SUGGESTIONS) */
.suggestions {
    flex: 1;
    overflow-y: auto;
}

.suggestions h3 {
    margin-bottom: 10px;
    opacity: 0.7;
}

/* CLOSE BUTTON */
.close-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #222;
    border: none;
    color: white;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}


</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="hero">

    <div class="hero-left">
        <h1>classlink.dev</h1>
        <input id="searchInput" class="search" placeholder="Search games..." />
    </div>

    <div class="hero-right">
        <img src="https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/websitedump/image_2026-04-29_231218267.png" />
    </div>

</div>

<div class="container">
    <h2>All Games</h2>
    <div class="games" id="allGames"></div>
</div>

<!-- VIEWER -->
<div class="viewer" id="viewer">

    <button class="close-btn" onclick="closeViewer()">✕</button>

    <div class="viewer-content">

        <!-- LEFT -->
        <div class="player-section">

            <div class="player" id="playerBox">
                <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
                <iframe id="gameFrame"></iframe>
            </div>

            <div class="info">
                <h2 id="gameTitle"></h2>
                <small id="gameAuthor"></small>
                <p id="gameDesc"></p>
            </div>

        </div>

        <!-- RIGHT -->
        <div class="suggestions">
            <h3>Suggested</h3>
            <div id="suggestedGames"></div>
        </div>

    </div>
</div>

<script>
/* BACKGROUND */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let particles = [];

function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

for (let i = 0; i < 160; i++) {
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        vx: (Math.random()-0.5),
        vy: (Math.random()-0.5)
    });
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for (let p of particles) {
        p.x += p.vx;
        p.y += p.vy;

        if (p.x<0||p.x>canvas.width) p.vx*=-1;
        if (p.y<0||p.y>canvas.height) p.vy*=-1;

        for (let o of particles) {
            let dx=p.x-o.x, dy=p.y-o.y;
            let d=Math.sqrt(dx*dx+dy*dy);

            if (d<170){
                ctx.strokeStyle="rgba(255,255,255,"+(1-d/170)+")";
                ctx.beginPath();
                ctx.moveTo(p.x,p.y);
                ctx.lineTo(o.x,o.y);
                ctx.stroke();
            }
        }
    }
    requestAnimationFrame(animate);
}
animate();

/* GAME DATA */
const games = [
{
    title:"1v1.lol",
    author:"JustPlay.LOL",
    description:"Basicly fortnite. CONTROLS: W, A, S, D for movement. Click for fire",
    category:"arcade",
    icon:"https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/gameicons/image_2026-04-29_231423328.png",
    url:"https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/1v1.LoL.html"
},
{
    title:"Ages of conflict",
    author:"JokuPelle",
    description:"Make countries fight.",
    category:"sim",
    icon:"https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/gameicons/image_2026-04-29_232004511.png",
    url:"https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/agesofconflict.html"
},
{
    title:"Eaglercraft",
    author:"Mojang",
    description:"The Eaglercraft webport of minecraft 1.12.2",
    category:"arcade",
    icon:"https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/gameicons/image_2026-04-29_232416159.png",
    url:"https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/processed%20(2).html"
},
{
    title:"Geometry Dash",
    author:"RobTop",
    description:"A pretty good Geometry Dash",
    category:"arcade",
    icon:"https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/gameicons/image_2026-04-29_232850230.png",
    url:"https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/processed%20(2).html"
},
{
    title:"Soundboard",
    author:"Unknown orgin and its 11:32pm typing this so.",
    description:"Lets you be an annoying fucker in class",
    category:"arcade",
    icon:"https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/gameicons/image_2026-04-29_232956146.png",
    url:"https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/Soundboard.html"
}
];

/* RENDER */
function renderGames(list, containerId){
    const c=document.getElementById(containerId);
    c.innerHTML="";
    list.forEach(g=>{
        const el=document.createElement("div");
        el.className="game";
        el.innerHTML=`<img src="${g.icon}"><div>${g.title}</div>`;
        el.onclick=()=>openGame(g);
        c.appendChild(el);
    });
}
renderGames(games,"allGames");

/* OPEN */
async function openGame(game){
    viewer.style.display="flex";

    gameTitle.innerText=game.title;
    gameAuthor.innerText="by "+game.author;
    gameDesc.innerText=game.description;

    const res=await fetch(game.url);
    const text=await res.text();
    gameFrame.srcdoc=text;

    renderSuggested(game);
}

/* CLOSE */
function closeViewer(){
    viewer.style.display="none";
    gameFrame.srcdoc="";
}

/* FULLSCREEN */
function toggleFullscreen(){
    const el=document.getElementById("playerBox");

    if(!document.fullscreenElement){
        el.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

/* SUGGESTED */
function renderSuggested(current){
    const c=document.getElementById("suggestedGames");
    c.innerHTML="";

    games
    .filter(g=>g.category===current.category && g.title!==current.title)
    .forEach(g=>{
        const el=document.createElement("div");
        el.className="game";
        el.innerHTML=`<img src="${g.icon}"><div>${g.title}</div>`;
        el.onclick=()=>openGame(g);
        c.appendChild(el);
    });
}

const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("input", () => {
    const query = searchInput.value.toLowerCase();

    const filtered = games.filter(g =>
        g.title.toLowerCase().includes(query) ||
        g.category.toLowerCase().includes(query)
    );

    renderGames(filtered, "allGames");
});

function openGame(game){
    const viewer = document.getElementById("viewer");

    viewer.classList.add("active");
    document.body.style.overflow = "hidden";

    document.getElementById("gameTitle").innerText = game.title;
    document.getElementById("gameAuthor").innerText = "by " + game.author;
    document.getElementById("gameDesc").innerText = game.description;

    fetch(game.url)
        .then(r => r.text())
        .then(html => {
            document.getElementById("gameFrame").srcdoc = html;
        });

    renderSuggested(game);
}

function closeViewer(){
    const viewer = document.getElementById("viewer");

    viewer.classList.remove("active");
    document.body.style.overflow = "";

    setTimeout(() => {
        document.getElementById("gameFrame").srcdoc = "";
    }, 200);
}
</script>

</body>
</html>

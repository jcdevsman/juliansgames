
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .desktop {
    width: 100%; min-height: 100vh;
    background: linear-gradient(135deg, #ff6b6b 0%, #ff9f43 12%, #ffd93d 24%, #6bcb77 36%, #4d96ff 48%, #845ef7 60%, #f77fbe 72%, #ff6b6b 84%, #ff9f43 100%);
    background-size: 300% 300%;
    animation: rainbowShift 8s ease infinite;
    padding: 5vw;
  }
  @keyframes rainbowShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  .search-bar { margin-bottom: 2vw; }
  .search-bar input {
    width: 100%; background: rgba(255,255,255,0.25); border: none; border-radius: 999px;
    padding: clamp(8px,1.5vw,14px) clamp(12px,2vw,20px);
    font-size: clamp(13px,1.8vw,18px); color: #fff; outline: none;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .search-bar input::placeholder { color: rgba(255,255,255,0.65); }
  .search-bar input:focus { background: rgba(255,255,255,0.35); }
  .app-item {
    display: flex; align-items: center; gap: clamp(10px,2vw,20px);
    padding: clamp(8px,1.5vw,14px) clamp(10px,1.5vw,16px);
    border-radius: clamp(10px,1.5vw,16px); cursor: pointer;
    transition: background 0.15s, transform 0.1s; margin-bottom: clamp(2px,0.5vw,6px);
  }
  .app-item:hover { background: rgba(255,255,255,0.22); transform: translateX(4px); }
  .app-icon {
    width: clamp(36px,5vw,56px); height: clamp(36px,5vw,56px); border-radius: clamp(8px,1vw,14px);
    display: flex; align-items: center; justify-content: center; font-size: clamp(16px,2.5vw,28px); flex-shrink: 0;
  }
  .app-info { flex: 1; min-width: 0; }
  .app-name { font-size: clamp(13px,1.6vw,18px); font-weight: 600; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  .app-desc { font-size: clamp(11px,1.1vw,14px); color: rgba(255,255,255,0.72); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  .app-btn {
    background: rgba(255,255,255,0.28); border: none; border-radius: 999px;
    padding: clamp(4px,0.6vw,8px) clamp(10px,1.5vw,18px);
    font-size: clamp(11px,1.1vw,14px); font-weight: 600; color: #fff; cursor: pointer;
    white-space: nowrap; font-family: -apple-system, BlinkMacSystemFont, sans-serif; transition: background 0.15s;
  }
  .app-btn:hover { background: rgba(255,255,255,0.45); }

  #fullscreenOverlay {
    display: none;
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    z-index: 9999; background: #000;
  }
  #fullscreenOverlay.active { display: block; }

  #appFrame {
    width: 100%; height: 100vh; border: none; background: #fff; display: block;
  }

  #closeBtn {
    position: fixed; top: 12px; left: 12px; z-index: 10000;
    width: 14px; height: 14px; background: #ff5f57; border: none; border-radius: 999px;
    cursor: pointer; opacity: 0; transition: opacity 0.2s;
  }
  #fullscreenOverlay.active:hover #closeBtn,
  #closeBtn:focus { opacity: 1; }
  #fullscreenOverlay.active ~ #closeBtn { opacity: 0; }
</style>

<div class="desktop">
  <div id="listView">
    <div class="search-bar">
      <input type="text" placeholder="&#128269; Search apps..." oninput="filterApps(this.value)" />
    </div>
    <div id="appItems"></div>
  </div>
</div>

<div id="fullscreenOverlay">
  <iframe id="appFrame"></iframe>
</div>
<button id="closeBtn" onclick="closeApp()"></button>

<script>
const PROXY = "https://api.allorigins.win/get?url=";

const apps = [
  { name: "Hacker News", desc: "Live front page of news.ycombinator.com", icon: "&#128240;", bg: "rgba(255,100,80,0.5)", url: "https://news.ycombinator.com" },
  { name: "Wikipedia", desc: "Today's featured article on wikipedia.org", icon: "&#128218;", bg: "rgba(255,160,40,0.5)", url: "https://en.wikipedia.org/wiki/Main_Page" },
  { name: "Example.com", desc: "The classic example domain, live", icon: "&#127760;", bg: "rgba(255,220,40,0.5)", url: "https://example.com" },
  { name: "JSONPlaceholder", desc: "Fake REST API — live JSON posts feed", icon: "&#123;&#125;", bg: "rgba(50,160,255,0.5)", url: "https://jsonplaceholder.typicode.com/posts", iconStyle: "font-family:monospace;font-weight:700;" },
  { name: "Paul Graham Essays", desc: "All essays listed on paulgraham.com", icon: "&#128221;", bg: "rgba(130,80,255,0.5)", url: "https://paulgraham.com/articles.html" },
  { name: "The Onion", desc: "Latest satirical news from theonion.com", icon: "&#129768;", bg: "rgba(80,200,100,0.5)", url: "https://www.theonion.com" },
  { name: "Lobsters", desc: "Tech link aggregator lobste.rs", icon: "&#129360;", bg: "rgba(220,80,180,0.5)", url: "https://lobste.rs" },
  { name: "xkcd", desc: "Latest comic from xkcd.com", icon: "&#128515;", bg: "rgba(255,80,120,0.5)", url: "https://xkcd.com" },
];

function renderApps(list) {
  document.getElementById("appItems").innerHTML = list.map(app => `
    <div class="app-item" onclick="openApp('${app.name}')">
      <div class="app-icon" style="background:${app.bg}">
        <span style="${app.iconStyle||''}">${app.icon}</span>
      </div>
      <div class="app-info">
        <div class="app-name">${app.name}</div>
        <div class="app-desc">${app.desc}</div>
      </div>
      <button class="app-btn" onclick="event.stopPropagation();openApp('${app.name}')">Open app</button>
    </div>
  `).join("");
}

function filterApps(q) {
  renderApps(apps.filter(a => a.name.toLowerCase().includes(q.toLowerCase()) || a.desc.toLowerCase().includes(q.toLowerCase())));
}

const overlay = document.getElementById("fullscreenOverlay");
const closeBtn = document.getElementById("closeBtn");

overlay.addEventListener("mouseenter", () => closeBtn.style.opacity = "1");
overlay.addEventListener("mouseleave", () => closeBtn.style.opacity = "0");

async function openApp(name) {
  const app = apps.find(a => a.name === name);
  document.getElementById("appFrame").srcdoc = "";
  overlay.classList.add("active");
  closeBtn.style.opacity = "0";

  try {
    const res = await fetch(PROXY + encodeURIComponent(app.url));
    const data = await res.json();
    let html = data.contents;
    html = html.replace(/(href|src)=["'](?!https?:\/\/|\/\/|data:|#|mailto)([^"']*?)["']/gi, (match, attr, path) => {
      try { return `${attr}="${new URL(path, app.url).href}"`; }
      catch { return match; }
    });
    document.getElementById("appFrame").srcdoc = html;
  } catch(e) {
    document.getElementById("appFrame").srcdoc = `<body style="font-family:sans-serif;padding:2rem;color:#333"><h2>Error</h2><p>${e.message}</p></body>`;
  }
}

function closeApp() {
  overlay.classList.remove("active");
  document.getElementById("appFrame").srcdoc = "";
  closeBtn.style.opacity = "0";
}

renderApps(apps);
</script>

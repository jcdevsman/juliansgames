    <style>
        body, html {
            margin: 0;           /* Removes default browser margins */
            padding: 0;
            height: 100%;
            overflow: hidden;    /* Prevents unwanted scrollbars on the main page */
        }

        iframe {
            display: block;      /* Changes iframe from inline to block element */
            background: #000;    /* Optional: sets background color while loading */
            border: none;        /* Removes default iframe border */
            width: 100vw;        /* 100% of the viewport width */
            height: 100vh;       /* 100% of the viewport height */
        }
    </style>
</head>

        src="https://odysee.com">

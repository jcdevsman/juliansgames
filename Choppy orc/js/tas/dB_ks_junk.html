<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Access Portal</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
}

input {
    padding: 12px;
    width: 250px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

button {
    margin-top: 10px;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}

.link {
    margin-top: 15px;
    font-size: 14px;
    color: #93c5fd;
    cursor: pointer;
}

.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
}

.popup-content {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

.popup img {
    width: 280px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>Enter Key</h1>

<input id="keyInput" placeholder="Enter key..." />
<button onclick="checkKey()">Submit</button>

<div class="link" onclick="openPopup()">Don't have a key?</div>

<div class="popup" id="popup">
  <div class="popup-content">
    <h2>Get a Key</h2>
    <img src="https://via.placeholder.com/300x200.png?text=Key+Info">
    <br><br>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>
/* ----------------------------
   CONFIG
---------------------------- */

const validKeys = [
  "devkey4231",
  "SECRET456",
  "KEY789"
];

const githubRawURL =
"https://raw.githubusercontent.com/jcdevsman/juliansgames/refs/heads/main/Choppy%20orc/js/tas/website.html";

/* ----------------------------
   DEVICE ID (local only)
---------------------------- */

function getDeviceId() {
    let id = localStorage.getItem("deviceId");
    if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem("deviceId", id);
    }
    return id;
}

/* ----------------------------
   KEY SYSTEM (CLIENT ONLY)
---------------------------- */

function checkKey() {
    const input = document.getElementById("keyInput").value.trim();
    const deviceId = getDeviceId();

    if (!validKeys.includes(input)) {
        alert("Invalid key");
        return;
    }

    // already used?
    const stored = JSON.parse(localStorage.getItem("usedKeys") || "{}");

    if (stored[input]) {
        if (stored[input] !== deviceId) {
            alert("This key is locked to another device.");
            return;
        }
    } else {
        stored[input] = deviceId;
        localStorage.setItem("usedKeys", JSON.stringify(stored));
    }

    unlock();
}

/* ----------------------------
   UNLOCK CONTENT
---------------------------- */

function unlock() {
    fetch(githubRawURL)
        .then(r => r.text())
        .then(html => {
            const w = window.open("about:blank", "_blank");
            w.document.open();
            w.document.write(html);
            w.document.close();
        });
}

/* ----------------------------
   POPUP
---------------------------- */

function openPopup() {
    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>

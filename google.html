<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Scaling Iframe</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        .full-width-iframe {
            width: 100%;
            height: 500px; /* Fixed height, variable width */
            border: none;
        }
    </style>
</head>
<body>

    <iframe src="https://www.google.com/?igu=1" class="full-width-iframe"></iframe>

</body>
</html>

            gap: 20px; 
            padding: 40px;

        .game-card { 
            background: #2d2d2d; 
            border: 1px solid #444; 
            color: white; 
            padding: 20px; 
            text-align: center; 
            cursor: pointer; 
            border-radius: 8px; 
            transition: 0.2s; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .game-card:hover { background: #3d3d3d; border-color: #666; }

        .game-icon {
            width: 80px;
            height: 80px;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            background: #444; 
        }
    </style>
</head>

    <script>
        async function launch(url) {
            const win = window.open('about:blank', '_blank');
            try {
                const response = await fetch(url);
                const htmlContent = await response.text();
                win.document.write(htmlContent);
                win.document.close();
            } catch (err) {
                win.document.write("<h1>Error loading game.</h1>");
            }
        }
    </script>
